name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  test:
    runs-on: ["self-hosted", "nixos", "X64"]

    defaults:
      run:
        shell: "nix develop -c bash -e {0}"

    steps:
      - uses: actions/checkout@v5

      - name: Prepare Nix environment
        run: |
          true

      - name: License check
        run: |
          reuse lint

      - name: Check auto-generated artefacts
        run: |
          util/check_artefacts.py

      - name: Lint - Ruff
        run: |
          ruff check

      - name: Generate software buildsystem
        run: |
          cmake -B build/sw -S sw

      - name: Lint - Clang Format
        run: |
          util/clang_format.py -i --dry-run -Werror

      - name: Lint - Clang Tidy
        run: |
          util/clang_tidy.py

      - name: Build software
        run: |
          cmake --build build/sw -j $(nproc)

      - name: Build verilator
        run: |
          fusesoc --cores-root=. run --target=sim --tool=verilator --setup --build lowrisc:mocha:top_chip_system

      - name: Run verilator software tests
        run: |
          ctest --test-dir build/sw -R sim_verilator
